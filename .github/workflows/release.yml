# Release lane: versioned platform packages from a single version source
# (build-and-packaging 14.1) and GitHub Release publication on tags (14.3).
#
# Scope note (2026-07-23): this lane never published a release — every tag from
# v0.1.0 onward failed, because five of six package targets cannot build what
# they were written to package:
#   - ios / android   apps/mobile is a placeholder (README + .gitkeep); there is
#                     no Xcode project and no gradlew to drive.
#   - windows-installer  needs the WiX toolset (candle/light), not installed on
#                     the runner, and stages from build_zip.ps1.
# Those three are therefore gated to manual workflow_dispatch runs, so a tag
# push publishes instead of failing on packages for software that does not
# exist yet. Re-enable a target on tags by flipping `on_tag` below once its
# application actually builds.
#
# The desktop shell (apps/desktop) is likewise a placeholder, so the macOS and
# Linux packages are CLI-only by design; their scripts fall back rather than
# fail.
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_override:
        description: "Override version (defaults to project() VERSION)"
        required: false
        type: string
      include_app_packages:
        description: "Also run the app-shell packages (ios/android/windows-installer) — expected to fail until those apps exist"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  # Resolve the one true version and assert the tag agrees with it.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        name: Resolve single-source version
        env:
          CYBER_VERSION_OVERRIDE: ${{ inputs.version_override }}
        run: |
          chmod +x packaging/version.sh
          packaging/version.sh --github-output
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            packaging/version.sh --verify-tag "${GITHUB_REF_NAME}"
          fi

  package:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos
            os: macos-latest
            script: packaging/macos/build_dmg.sh
            on_tag: true
          - target: linux
            os: ubuntu-latest
            script: packaging/linux/appimage.sh
            on_tag: true
          - target: windows-zip
            os: windows-latest
            script: packaging/windows/build_zip.ps1
            on_tag: true
          # Manual-only until the thing each one packages exists (see header).
          - target: windows-installer
            os: windows-latest
            script: packaging/windows/build_installer.ps1
            on_tag: false
          - target: ios
            os: macos-latest
            script: packaging/ios/build_archive.sh
            on_tag: false
          - target: android
            os: ubuntu-latest
            script: packaging/android/build_aab.sh
            on_tag: false
    runs-on: ${{ matrix.os }}
    if: ${{ matrix.on_tag || inputs.include_app_packages }}
    env:
      CYBER_VERSION_OVERRIDE: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install CMake/Ninja
        uses: lukka/get-cmake@latest

      - name: Set up Linux packaging tools
        if: runner.os == 'Linux' && startsWith(matrix.target, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 desktop-file-utils
          curl -fsSL -o /usr/local/bin/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /usr/local/bin/appimagetool

      - name: Set up JDK/Android
        if: matrix.target == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build and package (${{ matrix.target }})
        shell: bash
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          MACOS_NOTARY_KEYCHAIN_PROFILE: ${{ secrets.MACOS_NOTARY_KEYCHAIN_PROFILE }}
          WINDOWS_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          ANDROID_KEYSTORE_PATH: ${{ secrets.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          case "${{ matrix.script }}" in
            *.ps1) pwsh -File "${{ matrix.script }}" ;;
            *)     chmod +x "${{ matrix.script }}"; "${{ matrix.script }}" ;;
          esac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyberremesh-${{ matrix.target }}
          path: dist/cyberremesh-*
          if-no-files-found: error
          retention-days: 14

  # Publish a GitHub Release with every platform artifact attached (14.3).
  release:
    needs: [version, package]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: CyberRemesher ${{ needs.version.outputs.version }}
          draft: false
          prerelease: false
          # Auto-generate notes from the commits since the previous tag. Without
          # this the published release had an empty body, which is part of why
          # the lane was worth fixing rather than just making green.
          generate_release_notes: true
          # Do not fail the publish when a package is missing: three targets are
          # gated off on tags (see header), and a release with the artifacts that
          # do exist beats no release at all.
          fail_on_unmatched_files: false
          files: release-artifacts/cyberremesh-*
