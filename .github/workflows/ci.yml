name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: clang-format check
        run: |
          # Pin the version so the gate is reproducible (the distro package
          # tracks the runner image and its rules drift between releases).
          pipx install clang-format==18.1.8 || pip install --user clang-format==18.1.8
          find src apps tests \( -name '*.hpp' -o -name '*.cpp' \) \
            | xargs clang-format --dry-run --Werror

  license-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: License audit
        run: python3 tools/license_audit.py

  openspec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g @fission-ai/openspec@latest
      - run: openspec validate --all --strict

  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: lukka/get-cmake@latest
      - name: Configure (cpu-headless)
        run: cmake --preset cpu-headless
      - name: Build
        run: cmake --build --preset cpu-headless
      - name: Test
        run: ctest --preset cpu-headless
      - name: CLI smoke
        shell: bash
        run: |
          # The Windows runner builds with MinGW GCC; its exe needs the compiler's
          # runtime DLLs (libstdc++-6/libgcc_s/libwinpthread), which Git-bash's
          # minimal PATH omits — without them the exe can't start (exit 127).
          [ -d /c/mingw64/bin ] && export PATH="/c/mingw64/bin:$PATH"
          # Locate the CLI wherever the generator put it (Windows adds .exe and may
          # use a config subdir), so the smoke test is path/generator-agnostic.
          CLI="$(find ./build -type f \( -name cyberremesh -o -name cyberremesh.exe \) | head -1)"
          if [ -z "$CLI" ]; then
            echo "cyberremesh binary not found under ./build:"; find ./build -name 'cyberremesh*'; exit 1
          fi
          echo "using $CLI"
          "$CLI" --version
          "$CLI" --list-backends
